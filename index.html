<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>勾股定理互動實驗室</title>
    <style>
        /* 微信兼容性關鍵設置：防止系統下拉刷新 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* 鎖定背景，防止微信彈回 */
            background-color: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        svg {
            width: 95%;
            height: 95%;
            /* 關鍵：禁用瀏覽器默認觸摸行為，將控制權交給 JS */
            touch-action: none;
        }

        /* 樣式優化 */
        .handle { fill: #ffffff; stroke: #38bdf8; stroke-width: 6; cursor: grab; }
        .handle:active { r: 18; fill: #38bdf8; }
        .label { font-size: 15px; font-weight: 700; pointer-events: none; }
        .equation { font-size: 28px; font-weight: 800; fill: #f8fafc; }
        .square-a { fill: rgba(56, 189, 248, 0.2); stroke: #38bdf8; stroke-width: 2.5; stroke-dasharray: 5 3; }
        .square-b { fill: rgba(34, 197, 94, 0.2); stroke: #22c55e; stroke-width: 2.5; stroke-dasharray: 5 3; }
        .square-c { fill: rgba(234, 179, 8, 0.35); stroke: #eab308; stroke-width: 3.5; }
        .triangle { fill: rgba(255, 255, 255, 0.08); stroke: #ffffff; stroke-width: 2.5; stroke-linejoin: round; }
        .grid { stroke: rgba(255, 255, 255, 0.04); stroke-width: 1; }
        
        #hint {
            position: absolute;
            bottom: 40px;
            color: #475569;
            font-size: 12px;
            letter-spacing: 1px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="container">
    <svg id="main-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
            </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <text x="400" y="80" text-anchor="middle" class="equation">
            <tspan fill="#38bdf8">a²</tspan> + <tspan fill="#22c55e">b²</tspan> = <tspan fill="#eab308">c²</tspan>
        </text>
        <text x="400" y="125" text-anchor="middle" id="calc-text" fill="#64748b" font-size="18" font-family="monospace"></text>

        <g id="canvas-group">
            <polygon id="sq-a" class="square-a" />
            <polygon id="sq-b" class="square-b" />
            <polygon id="sq-c" class="square-c" />
            <polygon id="triangle" class="triangle" />

            <text id="val-a" class="label" fill="#38bdf8" text-anchor="middle"></text>
            <text id="val-b" class="label" fill="#22c55e" text-anchor="middle"></text>
            <text id="val-c" class="label" fill="#eab308" text-anchor="middle"></text>
        </g>

        <!-- 交互手柄 -->
        <circle id="handle-x" cx="520" cy="450" r="14" class="handle" />
        <circle id="handle-y" cx="350" cy="280" r="14" class="handle" />
    </svg>
    <div id="hint">微信專用版：請直接拖動白色圓點</div>
</div>

<script>
    const svg = document.getElementById('main-svg');
    const hX = document.getElementById('handle-x');
    const hY = document.getElementById('handle-y');
    const origin = { x: 350, y: 450 };

    let activeHandle = null;

    function update() {
        const x = parseFloat(hX.getAttribute('cx'));
        const y = parseFloat(hY.getAttribute('cy'));
        const a = x - origin.x;
        const b = origin.y - y;
        const c = Math.sqrt(a*a + b*b);

        document.getElementById('triangle').setAttribute('points', `${origin.x},${origin.y} ${x},${origin.y} ${origin.x},${y}`);
        document.getElementById('sq-a').setAttribute('points', `${origin.x},${origin.y} ${x},${origin.y} ${x},${origin.y + a} ${origin.x},${origin.y + a}`);
        document.getElementById('sq-b').setAttribute('points', `${origin.x},${origin.y} ${origin.x},${y} ${origin.x - b},${y} ${origin.x - b},${origin.y}`);

        const wx = b;
        const wy = -a;
        document.getElementById('sq-c').setAttribute('points', `${origin.x},${y} ${x},${origin.y} ${x + wx},${origin.y + wy} ${origin.x + wx},${y + wy}`);

        const sa = (a/40).toFixed(1);
        const sb = (b/40).toFixed(1);
        const sc = (c/40).toFixed(1);

        const lA = document.getElementById('val-a');
        lA.textContent = `a²=${(sa*sa).toFixed(1)}`;
        lA.setAttribute('x', origin.x + a/2);
        lA.setAttribute('y', origin.y + a/2 + 5);

        const lB = document.getElementById('val-b');
        lB.textContent = `b²=${(sb*sb).toFixed(1)}`;
        lB.setAttribute('x', origin.x - b/2);
        lB.setAttribute('y', origin.y - b/2 + 5);

        const lC = document.getElementById('val-c');
        lC.textContent = `c²=${(sc*sc).toFixed(1)}`;
        lC.setAttribute('x', (origin.x + x + x + wx + origin.x + wx) / 4);
        lC.setAttribute('y', (y + origin.y + origin.y + wy + y + wy) / 4 + 5);

        document.getElementById('calc-text').textContent = `${(sa*sa).toFixed(1)} + ${(sb*sb).toFixed(1)} = ${(sc*sc).toFixed(1)}`;
    }

    function getCoords(evt) {
        const CTM = svg.getScreenCTM();
        let clientX, clientY;
        if (evt.touches && evt.touches.length > 0) {
            clientX = evt.touches[0].clientX;
            clientY = evt.touches[0].clientY;
        } else {
            clientX = evt.clientX;
            clientY = evt.clientY;
        }
        return {
            x: (clientX - CTM.e) / CTM.a,
            y: (clientY - CTM.f) / CTM.d
        };
    }

    const startDrag = (e) => {
        activeHandle = e.target;
        // 關鍵：攔截微信默認行為
        if (e.cancelable) e.preventDefault();
    };

    const drag = (e) => {
        if (!activeHandle) return;
        // 持續攔截下拉刷新
        if (e.cancelable) e.preventDefault();
        
        const pos = getCoords(e);
        if (activeHandle === hX) {
            hX.setAttribute('cx', Math.max(origin.x + 30, Math.min(pos.x, 720)));
        } else if (activeHandle === hY) {
            hY.setAttribute('cy', Math.max(150, Math.min(pos.y, origin.y - 30)));
        }
        update();
    };

    const endDrag = () => { activeHandle = null; };

    // 事件監聽
    hX.addEventListener('mousedown', startDrag);
    hY.addEventListener('mousedown', startDrag);
    hX.addEventListener('touchstart', startDrag, { passive: false });
    hY.addEventListener('touchstart', startDrag, { passive: false });

    window.addEventListener('mousemove', drag, { passive: false });
    window.addEventListener('touchmove', drag, { passive: false });
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    update();
</script>

</body>
</html>
